server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compressão dos assets.
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Assets com hash no nome → cache longo.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API e healthcheck → backend (mesma origem, sem CORS).
  # proxy_pass sem path preserva o URI original (/api/... e /health).
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Margem para ingestões/relatórios mais demorados.
    proxy_read_timeout 60s;
  }

  location = /health {
    proxy_pass http://api:3000/health;
  }

  # SPA: todas as demais rotas caem no index.html (React Router).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
